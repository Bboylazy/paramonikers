<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paramonikers - Game Setup</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="logo">
<img src="transparentLogo.png" alt="Paramonikers Logo">
</div>

<h1>Game Setup</h1>

<label for="playerCount">Number of Players</label>

<br>

<select id="playerCount" onchange="updateCardInfo()">

<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
<option value="13">13</option>
<option value="14">14</option>
<option value="15">15</option>
<option value="16">16</option>

</select>

<br><br>

<label for="teamCount">Number of Teams</label>

<br>

<select id="teamCount">

<option value="2">2</option>
<option value="3">3</option>

</select>
<br><br>
<p id="cardInfo">
</p>


<br>

<button onclick="saveSettings()">Next</button>

<script src="settings.js"></script>

</body>

</html>
